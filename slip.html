<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Slip - EASyPAiSA</title>
<style>
body{font-family:Arial; background:#f5f5f5; margin:0; padding:0;}
.nav{background:#0a8a4a; padding:15px 20px; color:white; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; position:sticky; top:0;}
.nav b{font-size:18px;}
.nav-links a{color:white; margin:0 8px; text-decoration:none; font-weight:bold; padding:8px 12px; border-radius:5px;}
.nav-links a:hover{background:rgba(255,255,255,0.2);}
.container{max-width:450px; margin:20px auto; background:white; padding:25px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
h2{color:#0a8a4a; text-align:center; margin-bottom:20px;}
label{font-weight:bold; font-size:14px; display:block; margin-top:12px;}
input{width:100%; padding:11px; margin-top:5px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box; font-size:15px;}
input[readonly]{background:#eee;}
.btn{width:100%; padding:14px; background:#0a8a4a; color:white; border:none; border-radius:6px; font-size:16px; font-weight:bold; cursor:pointer; margin-top:20px;}
.btn:hover{background:#06703a;}
</style>
</head>
<body>

<div class="nav">
<b>NEW SLIP</b>
<div class="nav-links">
<a href="dashboard.html">Dashboard</a>
<a href="slip.html">Slip</a>
<a href="history.html">History</a>
<a href="settlement.html">Settlement</a>
<a href="records.html">Record</a>
<a href="#" onclick="logout()">Logout</a>
</div>
</div>
 <div style="position:absolute; top:70px; right:20px; color:black; font-size:14px; font-weight:500;">
  Design by: Zoya_X
</div>

<div class="container">
<h2>EASYPASA SLIP</h2>

<label>Slip No</label>
<input type="text" id="slipNo" readonly>

<label>Date</label>
<input type="text" id="date" readonly>

<label>EASyPAiSA To*</label>
<select id="to" required>
<option value="">--Select--</option>
<option value="ZAMAN Sons">ZAMAN Sons</option>
<option value="Zahid Sir">Zahid Sir</option>
</select>

<label>EASyPAiSA BY *</label>
<input type="text" id="by" placeholder="Sender Name">

<label>POS NO</label>
<input type="text" id="pos" placeholder="POS Number">

<label>JAZZ CASH</label>
<input type="text" id="jazz" value="981 xxx 012" readonly>

<label>AMOUNT *</label>
<input type="number" id="amount" placeholder="Enter Amount">

<button class="btn" onclick="saveAndPrint()">Save & Print</button>
</div>

<script>
// Login Check
if(localStorage.getItem("isLoggedIn")!== "true"){
window.location = "index.html";
}

function logout(){
localStorage.removeItem("isLoggedIn");
window.location = "index.html";
}

// Page Load
window.onload = function(){
document.getElementById('date').value = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD
    let records = JSON.parse(localStorage.getItem("records") || "[]");
    let lastSlip = records.length> 0? Number(records[records.length-1].slipNo) : 0;
document.getElementById('slipNo').value = lastSlip + 1;
}

function saveAndPrint(){
    let record = {
        date: date.value,
slipNo: slipNo.value,
        to: to.value,
        by: by.value,
pos: pos.value,
        jazz: jazz.value,
        amount: amount.value
    }

    if(!record.amount ||!record.by){
        alert("Amount aur BY wala field lazmihai!");
        return;
    }

    let records = JSON.parse(localStorage.getItem("records") || "[]");
records.push(record);
localStorage.setItem("records", JSON.stringify(records));

    alert("Slip No: " + record.slipNo + " Save ho gaya!");
printSlip(record);

    // Form Clear + Next Slip No
slipNo.value = Number(record.slipNo) + 1;
to.value=""; by.value=""; pos.value=""; amount.value="";
}

function printSlip(r){
    let win = window.open('', '', 'height=700,width=350');
win.document.write(`
<html><head><title>Print Slip</title></head>
<body style="font-family:Courier; width:300px; padding:10px; margin:0 auto;">
<h3 style="text-align:center; margin:5px 0;">EASYPAISA SLIP</h3>
<p style="text-align:center; margin:5px 0;">${r.date}</p>
<p style="text-align:center; margin:5px 0;"><b>Slip NO: ${r.slipNo}</b></p><hr>
<p><b>To:</b> ${r.to}</p><hr>
<p><b>BY:</b> ${r.by}</p><hr>
<p><b>POS:</b> ${r.pos}</p><hr>
<p><b>JAZZ CASH:</b> ${r.jazz}</p><hr>
<p><b>AMOUNT:</b> ${r.amount}</p><hr>
<p style="margin-top:30px;">SIGN: ________________</p>
<script>window.print(); window.onafterprint = function(){window.close();}<\/script>
</body></html>`);
win.document.close();
}
</script>
</body>
</html>
