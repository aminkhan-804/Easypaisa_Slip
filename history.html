<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>History</title>
<style>
body{font-family:Arial; background:#f5f5f5; margin:0; padding:0;}
.navbar{background:#28a745; color:white; padding:12px 30px; display:flex; justify-content:space-between;}
.logo{font-weight:bold; font-size:16px;}
.menu a{color:white; text-decoration:none; margin-left:20px; font-weight:bold;}
.container{max-width:1000px; margin:20px auto; background:white; padding:20px; border-radius:8px; box-shadow:0 0 10px #ccc;}
h2{text-align:center; color:#666; margin-bottom:10px;}
.controls{margin-bottom:15px; text-align:center;}
.controls label{font-weight:bold;}
.controls input{padding:6px; border:1px solid #ccc; border-radius:4px; width:250px;}
.btn-add{background:#5cb85c; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer; font-weight:bold; float:right;}
table{width:100%; border-collapse:collapse; margin-bottom:20px; margin-top:10px;}
th{background:#5cb85c; color:white; padding:10px; text-align:center; font-size:14px;}
td{border:1px solid #ddd; padding:8px; text-align:center; font-size:13px;}
tr:nth-child(even){background:#f9f9f9;}
.btn-edit{background:#f0ad4e; color:white; border:none; padding:5px 12px; border-radius:3px; cursor:pointer; font-size:12px; margin:2px;}
.btn-del{background:#d9534f; color:white; border:none; padding:5px 12px; border-radius:3px; cursor:pointer; font-size:12px; margin:2px;}

/* Summary Tables */
.summary-title{background:#337ab7; color:white; padding:10px; text-align:center; font-weight:bold; margin-top:20px;}
.total-row{background:#ffdddd; font-weight:bold;}
.total-row2{background:#d4edda; font-weight:bold;}

/* Form Box */
#editFormBox{display:none; background:#f8f9fa; padding:15px; border:2px solid #28a745; border-radius:8px; margin-top:10px;}
.form-group{display:inline-block; width:18%; margin:5px;}
.form-group label{display:block; font-weight:bold; font-size:12px;}
.form-group input{width:90%; padding:6px;}

/* Password Modal */
#passModal{display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;}
#passModal.box{background:white; padding:20px; border-radius:8px; width:320px; text-align:center;}
#passModal input{width:90%; padding:8px; margin:10px 0; border:1px solid #ccc; border-radius:4px;}
</style>
</head>
<body>

<div class="navbar">
<div class="logo">EASyPAiSA SYSTEM</div>
<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="slip.html">Slip</a>
<a href="history.html">History</a>
<a href="settlement.html">Settlement</a>
<a href="record.html">Record</a>
<a href="index.html">Logout</a>
</div>
</div>
<h><b>dESigN_bY: ZOYA_X</b></h>

<div class="container">
<h2>Last 7 Days History</h2>
<button class="btn-add" onclick="showNewForm()">+ New Transaction</button>

<div class="controls">
<label>Search: </label>
<input type="text" id="searchBox" onkeyup="loadHistory()" placeholder="Name, CNIC, Number...">
</div>

<!-- Main History Table -->
<table>
<thead>
<tr>
<th>S.No</th>
<th>Date</th>
<th>To</th>
<th>BY</th>
<th>POS</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>
<tbody id="historyTable"></tbody>
</table>

<!-- POS Wise Total -->
<div class="summary-title">POS Wise Total</div>
<table>
<thead>
<tr>
<th>POS</th>
<th>Total Count</th>
<th>Total Amount</th>
</tr>
</thead>
<tbody id="posSummary"></tbody>
</table>

<!-- BY Wise Total -->
<div class="summary-title">BY Wise Total</div>
<table>
<thead>
<tr>
<th>BY</th>
<th>Total Count</th>
<th>Total Amount</th>
</tr>
</thead>
<tbody id="bySummary"></tbody>
</table>

<!-- Form Edit Box -->
<div id="editFormBox">
<h3 id="formTitle">Add New Transaction</h3>
<div class="form-group"><label>Date</label><input type="date" id="f_date"></div>
<div class="form-group"><label>To</label><input type="text" id="f_to"></div>
<div class="form-group"><label>BY</label><input type="text" id="f_by"></div>
<div class="form-group"><label>POS</label><input type="number" id="f_pos"></div>
<div class="form-group"><label>Amount</label><input type="number" id="f_amount"></div>
<br>
<button class="btn-edit" id="saveBtn" onclick="saveNew()">Save</button>
<button class="btn-edit" id="updateBtn" onclick="updateRecord()" style="background:#337ab7; display:none;">Update</button>
<button class="btn-del" onclick="cancelEdit()">Cancel</button>
</div>

</div>

<!-- Password Modal -->
<div id="passModal">
<div class="box">
<h3 id="passTitle">Enter Passcode</h3>
<input type="password" id="passInput" placeholder="******">
<br>
<button class="btn-edit" onclick="checkPass()">OK</button>
<button class="btn-del" onclick="closePassModal()">Cancel</button>
</div>
</div>

<script>
let actionIndex = -1;
let actionType = '';
let editIndex = -1;
const PASSCODE = "1234";

window.onload = function(){
loadHistory();
  let now = new Date();
document.getElementById('f_date').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}

function loadHistory(){
  let records = JSON.parse(localStorage.getItem('records')) || [];
  let tbody = document.getElementById('historyTable');
tbody.innerHTML = '';
  let search = document.getElementById('searchBox').value.toLowerCase();

  let today = new Date();
  let sevenDaysAgo = new Date();
sevenDaysAgo.setDate(today.getDate() - 7);

  let filtered = records.filter(rec => {
    let recDate = new Date(rec.date);
    let matchSearch = (rec.to || '').toLowerCase().includes(search) || (rec.by || '').toLowerCase().includes(search) || (rec.pos || '').toString().includes(search);
    return recDate>= sevenDaysAgo&&matchSearch;
  });

  let count = 1;
  if(filtered.length === 0){
tbody.innerHTML = `<tr><td colspan="7">No Record Found</td></tr>`;
  } else {
filtered.forEach((rec) => {
      let originalIndex = records.indexOf(rec);
tbody.innerHTML += `<tr>
<td>${count++}</td>
<td>${rec.date}</td>
<td>${rec.to}</td>
<td>${rec.by}</td>
<td>${rec.pos}</td>
<td>${Number(rec.amount) || 0}</td>
<td>
<button class="btn-edit" onclick="askPass(${originalIndex}, 'edit')">Edit</button>
<button class="btn-del" onclick="askPass(${originalIndex}, 'delete')">Delete</button>
</td>
</tr>`;
    });
  }
makeSummary(filtered);
}

function makeSummary(data){
  let posObj = {};
  let byObj = {};

data.forEach(rec => {
    let pos = rec.pos || '0';
    let by = rec.by || 'Unknown';
    let amt = Number(rec.amount) || 0;

    if(!posObj[pos]) posObj[pos] = {count:0, total:0};
posObj[pos].count++;
posObj[pos].total += amt;

    if(!byObj[by]) byObj[by] = {count:0, total:0};
byObj[by].count++;
byObj[by].total += amt;
  });

  // POS Table
  let posHtml = ''; let posTotalAmt = 0; let posTotalCount = 0;
  for(let key in posObj){
posHtml += `<tr><td>${key}</td><td>${posObj[key].count}</td><td>${posObj[key].total}</td></tr>`;
posTotalAmt += posObj[key].total;
posTotalCount += posObj[key].count;
  }
posHtml += `<tr class="total-row"><td>Total</td><td>${posTotalCount}</td><td>${posTotalAmt}</td></tr>`;
document.getElementById('posSummary').innerHTML = posHtml;

  // BY Table
  let byHtml = ''; let byTotalAmt = 0; let byTotalCount = 0;
  for(let key in byObj){
byHtml += `<tr><td>${key}</td><td>${byObj[key].count}</td><td>${byObj[key].total}</td></tr>`;
byTotalAmt += byObj[key].total;
byTotalCount += byObj[key].count;
  }
byHtml += `<tr class="total-row2"><td>Total</td><td>${byTotalCount}</td><td>${byTotalAmt}</td></tr>`;
document.getElementById('bySummary').innerHTML = byHtml;
}

function askPass(index, type){
actionIndex = index; actionType = type;
document.getElementById('passModal').style.display = 'flex';
document.getElementById('passInput').value = '';
document.getElementById('passTitle').innerText = type === 'edit'? 'Enter Passcode to Edit' : 'Enter Passcode to Delete';
}
function closePassModal(){document.getElementById('passModal').style.display = 'none';}
function checkPass(){
  if(document.getElementById('passInput').value === PASSCODE){
    if(actionType === 'edit') showEditForm(actionIndex);
    else deleteRecord(actionIndex);
  }else alert("Wrong Passcode!");
closePassModal();
}
function showEditForm(index){
  let records = JSON.parse(localStorage.getItem('records')) || [];
  let rec = records[index];
editIndex = index;
document.getElementById('formTitle').innerText = "Edit Transaction";
document.getElementById('f_date').value = rec.date;
document.getElementById('f_to').value = rec.to;
document.getElementById('f_by').value = rec.by;
document.getElementById('f_pos').value = rec.pos;
document.getElementById('f_amount').value = rec.amount;
document.getElementById('saveBtn').style.display = 'none';
document.getElementById('updateBtn').style.display = 'inline-block';
document.getElementById('editFormBox').style.display = 'block';
}
function showNewForm(){
editIndex = -1;
document.getElementById('formTitle').innerText = "Add New Transaction";
document.getElementById('f_to').value = ''; document.getElementById('f_by').value = '';
document.getElementById('f_pos').value = ''; document.getElementById('f_amount').value = '';
document.getElementById('saveBtn').style.display = 'inline-block';
document.getElementById('updateBtn').style.display = 'none';
document.getElementById('editFormBox').style.display = 'block';
}
function cancelEdit(){document.getElementById('editFormBox').style.display = 'none';}
function saveNew(){
  let records = JSON.parse(localStorage.getItem('records')) || [];
  let newRec = {
    date: document.getElementById('f_date').value,
    to: document.getElementById('f_to').value,
    by: document.getElementById('f_by').value,
pos: document.getElementById('f_pos').value,
    amount: Number(document.getElementById('f_amount').value)
  };
records.push(newRec);
localStorage.setItem('records', JSON.stringify(records));
cancelEdit(); loadHistory(); alert("Record Saved");
}
function updateRecord(){
  let records = JSON.parse(localStorage.getItem('records')) || [];
  records[editIndex] = {
    date: document.getElementById('f_date').value,
    to: document.getElementById('f_to').value,
    by: document.getElementById('f_by').value,
pos: document.getElementById('f_pos').value,
    amount: Number(document.getElementById('f_amount').value)
  };
localStorage.setItem('records', JSON.stringify(records));
cancelEdit(); loadHistory(); alert("Record Updated");
}
function deleteRecord(index){
  let records = JSON.parse(localStorage.getItem('records')) || [];
records.splice(index, 1);
localStorage.setItem('records', JSON.stringify(records));
loadHistory(); alert("Record Deleted");
}
</script>

</body>
</html>
