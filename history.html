<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History - EASYPASA</title>
<style>
body{font-family:Arial; background:#f5f5f5; margin:0; padding:0;}
.nav{background:#0a8a4a; padding:15px 20px; color:white; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; position:sticky; top:0;}
.nav b{font-size:18px;}
.nav-links a{color:white; margin:0 8px; text-decoration:none; font-weight:bold; padding:8px 12px; border-radius:5px;}
.nav-links a:hover{background:rgba(255,255,255,0.2);}
.container{max-width:1100px; margin:20px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
h2{color:#0a8a4a; margin-bottom:15px;}
table{width:100%; border-collapse:collapse; margin-top:15px;}
th, td{border:1px solid #ddd; padding:10px; text-align:center; font-size:14px;}
th{background:#0a8a4a; color:white;}
tr:nth-child(even){background:#f9f9f9;}
.total-row{font-weight:bold; background:#e8f5e9 !important;}
.no-data{text-align:center; padding:20px; color:#888;}
.btn-delete{background:#d32f2f; color:white; border:none; padding:6px 12px; border-radius:5px; cursor:pointer; font-size:13px;}
.btn-delete:hover{background:#b71c1c;}
</style>
</head>
<body>

<div class="nav">
<b>HISTORY - Last 7 Days</b>
<div class="nav-links">
<a href="dashboard.html">Dashboard</a>
<a href="slip.html">Slip</a>
<a href="history.html">History</a>
<a href="settlement.html">Settlement</a>
<a href="records.html">Record</a>
<a href="#" onclick="logout()">Logout</a>
</div>
</div>

<div class="container">
<h2>Last 7 Days Records</h2>
<table id="historyTable">
<thead>
<tr>
<th>Date</th>
<th>Slip No</th>
<th>To</th>
<th>BY</th>
<th>POS</th>
<th>Jazz Cash</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>
<tbody id="historyBody">
</tbody>
<tfoot id="historyFoot">
</tfoot>
</table>
</div>

<script>
// Login Check
if(localStorage.getItem("isLoggedIn")!== "true"){
window.location = "index.html";
}

function logout(){
localStorage.removeItem("isLoggedIn");
window.location = "index.html";
}

// Load History
function loadHistory(){
    let allRecords = JSON.parse(localStorage.getItem("records") || "[]");
    let today = new Date();
    let sevenDaysAgo = new Date();
sevenDaysAgo.setDate(today.getDate() - 7);

    // Sirf last 7 din ka data filter karo
    let historyRec = allRecords.filter(r => {
        let recDate = new Date(r.date);
        return recDate>= sevenDaysAgo&&recDate<= today;
    }).reverse(); // latest pehle

    let tbody = document.getElementById('historyBody');
tbody.innerHTML = "";
    let totalAmount = 0;

    if(historyRec.length === 0){
tbody.innerHTML = `<tr><td colspan="8" class="no-data">Last 7 din me koi record nahimila</td></tr>`;
document.getElementById('historyFoot').innerHTML = "";
    } else {
historyRec.forEach(r => {
totalAmount += Number(r.amount || 0);
            // original index find karo delete keliye
            let originalIndex = allRecords.findIndex(x =>x.slipNo == r.slipNo&&x.date == r.date&&x.amount == r.amount);
tbody.innerHTML += `
<tr>
<td>${r.date}</td>
<td>${r.slipNo}</td>
<td>${r.to}</td>
<td>${r.by}</td>
<td>${r.pos}</td>
<td>${r.jazz}</td>
<td>${r.amount}</td>
<td><button class="btn-delete" onclick="deleteRecord(${originalIndex})">Delete</button></td>
</tr>`;
        });

        // Total Row
document.getElementById('historyFoot').innerHTML = `
<tr class="total-row">
<td colspan="6">Total Amount - Last 7 Days</td>
<td>${totalAmount}</td>
<td></td>
</tr>`;
    }
}

function deleteRecord(index){
    let pass = prompt("Delete keliye Admin Password dalein:");

    // Password yahan change karsakte ho
    if(pass === "1234"){
        if(confirm("Kya aapwaqai is slip ko delete karnachahtehain?")){
            let records = JSON.parse(localStorage.getItem("records") || "[]");
records.splice(index, 1);
localStorage.setItem("records", JSON.stringify(records));
            alert("Record Delete ho gaya!");
loadHistory(); // table refresh
        }
    } else if(pass !== null){
        alert("Ghalat Password! Delete nahi ho sakta.");
    }
}

window.onload = loadHistory;
</script>
</body>
</html>
