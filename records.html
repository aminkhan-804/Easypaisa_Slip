<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Records - EASyPAiSA</title>
<style>
body{font-family:Arial; background:#f5f5f5; margin:0; padding:0;}
.nav{background:#0a8a4a; padding:15px 20px; color:white; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; position:sticky; top:0;}
.nav b{font-size:18px;}
.nav-links a{color:white; margin:0 8px; text-decoration:none; font-weight:bold; padding:8px 12px; border-radius:5px;}
.nav-links a:hover{background:rgba(255,255,255,0.2);}
.container{max-width:1200px; margin:20px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
h2{color:#0a8a4a; margin-bottom:15px;}
.filter{margin-bottom:20px; display:flex; gap:10px; flex-wrap:wrap;}
.filter button{padding:10px 18px; background:#ccc; color:#000; border:none; border-radius:6px; font-weight:bold; cursor:pointer;}
.filter button.active{background:#0a8a4a; color:white;}
.table-wrap{overflow-x:auto;}
table{width:100%; border-collapse:collapse; margin-top:15px; min-width:800px;}
th, td{border:1px solid #ddd; padding:10px; text-align:center; font-size:14px;}
th{background:#0a8a4a; color:white; position:sticky; top:0;}
tr:nth-child(even){background:#f9f9f9;}
.total-row{font-weight:bold; background:#e8f5e9!important;}
.no-data{text-align:center; padding:20px; color:#888;}
.btn-print{margin-top:15px; padding:10px 20px; background:#0a8a4a; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;}
</style>
</head>
<body>

<div class="nav">
<b>ALL RECORDS</b>
<div class="nav-links">
<a href="dashboard.html">Dashboard</a>
<a href="slip.html">Slip</a>
<a href="history.html">History</a>
<a href="settlement.html">Settlement</a>
<a href="records.html">Record</a>
<a href="#" onclick="logout()">Logout</a>
</div>
</div>
<div style="position:absolute; top:70px; right:20px; color:black; font-size:14px; font-weight:500;">
  Design by: Zoya_X
</div>

<div class="container">
<h2>Complete Records</h2>

<div class="filter">
<button class="active" onclick="loadRecords('all', this)">All</button>
<button onclick="loadRecords('weekly', this)">This Week</button>
<button onclick="loadRecords('monthly', this)">This Month</button>
<button onclick="loadRecords('yearly', this)">This Year</button>
</div>

<div class="table-wrap">
<table id="recordTable">
<thead>
<tr>
<th>Date</th>
<th>Slip No</th>
<th>To</th>
<th>BY</th>
<th>POS</th>
<th>Jazz Cash</th>
<th>Amount</th>
</tr>
</thead>
<tbody id="recordBody">
</tbody>
<tfoot id="recordFoot">
</tfoot>
</table>
</div>
<button class="btn-print" onclick="window.print()">Print This Report</button>
</div>

<script>
// Login Check
if(localStorage.getItem("isLoggedIn")!== "true"){
window.location = "index.html";
}

function logout(){
localStorage.removeItem("isLoggedIn");
window.location = "index.html";
}

// Page Load
window.onload = function(){
loadRecords('all');
}

function loadRecords(type, btn){
    // Button active class
document.querySelectorAll('.filter button').forEach(b =>b.classList.remove('active'));
    if(btn) btn.classList.add('active');

    let records = JSON.parse(localStorage.getItem("records") || "[]");
    let today = new Date();
    let filtered = [];

    if(type === 'weekly'){
        let weekStart = new Date();
weekStart.setDate(today.getDate() - today.getDay()); // Sunday
        filtered = records.filter(r => new Date(r.date) >= weekStart);
    }
    else if(type === 'monthly'){
        let monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
        filtered = records.filter(r => new Date(r.date) >= monthStart);
    }
    else if(type === 'yearly'){
        let yearStart = new Date(today.getFullYear(), 0, 1);
        filtered = records.filter(r => new Date(r.date) >= yearStart);
    }
    else{
        filtered = records; // all
    }

filtered.reverse(); // latest first
displayRecords(filtered, type);
}

function displayRecords(data, type){
    let tbody = document.getElementById('recordBody');
tbody.innerHTML = "";
    let totalAmount = 0;

    if(data.length === 0){
tbody.innerHTML = `<tr><td colspan="7" class="no-data">Koi record nahimila</td></tr>`;
document.getElementById('recordFoot').innerHTML = "";
        return;
    }

data.forEach(r => {
totalAmount += Number(r.amount || 0);
tbody.innerHTML += `
<tr>
<td>${r.date}</td>
<td>${r.slipNo}</td>
<td>${r.to}</td>
<td>${r.by}</td>
<td>${r.pos}</td>
<td>${r.jazz}</td>
<td>${r.amount}</td>
</tr>`;
    });

document.getElementById('recordFoot').innerHTML = `
<tr class="total-row">
<td colspan="6">Total Amount - ${type.toUpperCase()}</td>
<td>${totalAmount}</td>
</tr>`;
}
</script>
</body>
</html>
