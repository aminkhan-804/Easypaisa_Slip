<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settlement - EASyPAiSA</title>
<style>
body{font-family:Arial; background:#f5f5f5; margin:0; padding:0;}
.nav{background:#0a8a4a; padding:15px 20px; color:white; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; position:sticky; top:0;}
.nav b{font-size:18px;}
.nav-links a{color:white; margin:0 8px; text-decoration:none; font-weight:bold; padding:8px 12px; border-radius:5px;}
.nav-links a:hover{background:rgba(255,255,255,0.2);}
.container{max-width:1000px; margin:20px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
h2{color:#0a8a4a; text-align:center; background:#fff3cd; padding:10px; margin:0;}
.date-head{text-align:center; background:#d1ecf1; padding:8px; font-weight:bold; margin-bottom:10px;}
.filter{margin-bottom:15px; display:flex; gap:10px; align-items:center; justify-content:center;}
.filter input{padding:10px; border:1px solid #ccc; border-radius:6px;}
.filter button{padding:10px 18px; background:#0a8a4a; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;}
table{width:100%; border-collapse:collapse; margin-top:10px; font-size:14px;}
th, td{border:1px solid #000; padding:8px; text-align:center;}
th{background:#f8d7da; font-weight:bold;}
.received{background:#d4edda;}
.pos{background:#cce5ff;}
.amount{background:#f8d7da;}
.total-row{background:#fff3cd!important; font-weight:bold; font-size:15px;}
.no-data{text-align:center; padding:20px; color:#888;}
.btn-print{margin-top:15px; padding:10px 20px; background:#0a8a4a; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;}
@media print{
.nav,.filter,.btn-print{display:none;}
  body{background:white;}
.container{box-shadow:none; margin:0; padding:0;}
}
</style>
</head>
<body>

<div class="nav">
<b>SETTLEMENT</b>
<div class="nav-links">
<a href="dashboard.html">Dashboard</a>
<a href="slip.html">Slip</a>
<a href="history.html">History</a>
<a href="settlement.html">Settlement</a>
<a href="records.html">Record</a>
<a href="#" onclick="logout()">Logout</a>
</div>
</div>
<div style="position:absolute; top:70px; right:20px; color:black; font-size:14px; font-weight:500;">
  Design by: Zoya_X
</div>

<div class="container">
<h2>Settlement</h2>
<div class="date-head" id="dateHead"></div>

<div class="filter">
<label><b>Select Date:</b></label>
<input type="date" id="settleDate">
<button onclick="loadSettlement()">Show</button>
<button onclick="loadToday()">Today</button>
</div>

<table id="settleTable">
<thead>
<tr>
<th>No.</th>
<th class="received">Received</th>
<th class="pos">POS</th>
<th class="amount">Amount</th>
</tr>
</thead>
<tbody id="settleBody">
</tbody>
<tfoot id="settleFoot">
</tfoot>
</table>

<button class="btn-print" onclick="window.print()">Print Settlement</button>
</div>

<script>
if(localStorage.getItem("isLoggedIn")!== "true"){
window.location = "index.html";
}
function logout(){
localStorage.removeItem("isLoggedIn");
window.location = "index.html";
}
window.onload = function(){
document.getElementById('settleDate').value = new Date().toISOString().split('T')[0];
loadSettlement();
}
function loadToday(){
document.getElementById('settleDate').value = new Date().toISOString().split('T')[0];
loadSettlement();
}
function loadSettlement(){
    let selectedDate = document.getElementById('settleDate').value;
document.getElementById('dateHead').innerText = new Date(selectedDate).toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

    let records = JSON.parse(localStorage.getItem("records") || "[]");
    let dayRecords = records.filter(r =>r.date === selectedDate);

    let tbody = document.getElementById('settleBody');
tbody.innerHTML = "";

    // 1. POS Wise Detail
dayRecords.forEach((r, i) => {
tbody.innerHTML += `
<tr>
<td>${i+1}</td>
<td class="received">${r.by}</td>
<td class="pos">${r.pos || 0}</td>
<td class="amount">${r.amount}</td>
</tr>`;
    });

    // 2. BY Wise Total
    let settlement = {};
dayRecords.forEach(r => {
        let byName = r.by || "Unknown";
        if(!settlement[byName]){
            settlement[byName] = {count: 0, amount: 0};
        }
        settlement[byName].count += 1;
        settlement[byName].amount += Number(r.amount || 0);
    });

    let grandTotalSlips = 0;
    let grandTotalAmount = 0;
    let footHTML = "";

    for(let by in settlement){
grandTotalSlips += settlement[by].count;
grandTotalAmount += settlement[by].amount;
footHTML += `
<tr>
<td colspan="2">${by}</td>
<td>${settlement[by].count}</td>
<td>${settlement[by].amount}</td>
</tr>`;
    }

    // Grand Total
footHTML += `
<tr class="total-row">
<td colspan="2">Total</td>
<td>${grandTotalSlips}</td>
<td>${grandTotalAmount}</td>
</tr>`;

document.getElementById('settleFoot').innerHTML = footHTML;
}
</script>
</body>
</html>
